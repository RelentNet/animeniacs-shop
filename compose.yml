name: animeniacs

services:
  postgres:
    image: postgres:16-alpine
    container_name: animeniacs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-animeniacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-animeniacs}
      POSTGRES_DB: ${POSTGRES_DB:-animeniacs}
      # Plausible was removed 2026-05-20, Logto was removed 2026-05-20.
      # Both now run on the shared relentnet Coolify infrastructure
      # (Plausible at analytics.relentnet.dev, Logto at
      # auth.animeniacs.shop). Each gets its own isolated database.
      # No extra databases need to be created here anymore.
      POSTGRES_MULTIPLE_DATABASES: ""
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-animeniacs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animeniacs-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-animeniacs}:${POSTGRES_PASSWORD:-animeniacs}@postgres:5432/${POSTGRES_DB:-animeniacs}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Logto now lives at auth.animeniacs.shop (Coolify); see .env.local
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-https://auth.animeniacs.shop}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # Logto auth was removed 2026-05-20. It now runs on the shared
  # relentnet Coolify infrastructure at https://auth.animeniacs.shop
  # (admin console at https://auth-admin.animeniacs.shop), standalone
  # with its own embedded Postgres. See docs/operations/logto-setup.md.
  #
  # Plausible analytics was removed 2026-05-20 — runs centrally at
  # https://analytics.relentnet.dev. See docs/operations/analytics.md.

volumes:
  postgres-data:
