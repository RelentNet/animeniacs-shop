name: animeniacs

services:
  postgres:
    image: postgres:16-alpine
    container_name: animeniacs-postgres
    restart: unless-stopped
    profiles: [local]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-animeniacs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-animeniacs}
      POSTGRES_DB: ${POSTGRES_DB:-animeniacs}
      # Plausible was removed 2026-05-20, Logto was removed 2026-05-20.
      # Both now run on the shared relentnet Coolify infrastructure
      # (Plausible at analytics.relentnet.dev, Logto at
      # auth.animeniacs.shop). Each gets its own isolated database.
      # No extra databases need to be created here anymore.
      POSTGRES_MULTIPLE_DATABASES: ""
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-animeniacs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate-runtime
    container_name: animeniacs-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"
    # Locally (with --profile local), wait for the embedded postgres.
    # In Coolify (no profile), Coolify ensures the managed Postgres
    # resource is up before this stack starts, so we mark required:false.
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # MUST specify target explicitly: the Dockerfile ends with the
      # migrate-runtime stage, and `docker build` (no --target) picks
      # the LAST stage as the default. Without `target: runner` the
      # app service would build from migrate-runtime and run
      # `pnpm db:migrate` as CMD instead of `node server.js`.
      # Discovered in Phase 7.5/B.6 — first Coolify deploy was running
      # drizzle migrate in the app container forever.
      target: runner
    container_name: animeniacs-app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # better-auth (Phase 15 — replaced Logto). BETTER_AUTH_SECRET is REQUIRED.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      # Comma-separated emails granted admin without a DB write (the Postgres is
      # internal to Coolify, so grant-admin can't run from a workstation).
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SQUARE_ENV: ${SQUARE_ENV:-sandbox}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN}
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${SQUARE_WEBHOOK_SIGNATURE_KEY:-}
      DISCORD_ORDER_WEBHOOK_URL: ${DISCORD_ORDER_WEBHOOK_URL:-}
      SMSEDGE_TOKEN: ${SMSEDGE_TOKEN:-}
      SMSEDGE_BASE_URL: ${SMSEDGE_BASE_URL:-https://sms-edge.relentnet.dev}
      NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL: ${NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL:-}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-animeniacs.shop}
      # Phase 10 — abandoned-cart recovery emails + cron
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      CRON_SECRET: ${CRON_SECRET:-}
      ABANDONED_CART_THRESHOLD_MINUTES: ${ABANDONED_CART_THRESHOLD_MINUTES:-60}
    # No host port binding: in Coolify (and any reverse-proxied deploy)
    # Traefik routes to the container via the shared Docker network using
    # `expose`. Local devs use `pnpm dev` for hot-reload work; the
    # compose stack with `--profile local` is for verifying the Docker
    # build end-to-end and is reached via the container's internal IP
    # or a temporary `docker compose run -p 3000:3000 app` override.
    # Phase 7.5 plan deviation: spec had `ports: 3000:3000` but the
    # Coolify host port 3000 is already allocated by another container.
    expose:
      - "3000"
    volumes:
      # Durable upload storage. User-uploaded images (artist avatars today;
      # ip-covers/, review-photos/, event-logos/ in future phases) are written
      # here and persist across container rebuilds. See src/lib/images/upload.ts.
      - uploads-data:/app/public/images/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # Logto auth was removed 2026-05-20. It now runs on the shared
  # relentnet Coolify infrastructure at https://auth.animeniacs.shop
  # (admin console at https://auth-admin.animeniacs.shop), standalone
  # with its own embedded Postgres. See docs/operations/logto-setup.md.
  #
  # Plausible analytics was removed 2026-05-20 — runs centrally at
  # https://analytics.relentnet.dev. See docs/operations/analytics.md.

volumes:
  postgres-data:
  uploads-data:
